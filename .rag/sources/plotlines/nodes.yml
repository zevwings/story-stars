  - id: PL-M-004
    type: 主线
    name: 核心反派责任链清算
    status: pending
    locator: 通过有效证言、现实记录与跨案件证据完成齐心、陆佳凝及分层共犯责任链的追查、审判与后果落地。
    criteria:
      - 正文或定稿摘要明确核心反派被找到并进入正式审判流程。
      - 正文或定稿摘要以可复核证据确认陆佳凝并非事后包庇者，而是境外承接网络的共同设计者与直接负责人。
      - 正文或定稿摘要明确齐心、陆佳凝及其他共犯的责任按具体参与行为分层。
      - 正文或定稿摘要明确裴家核心责任人按购买、拘禁、实验、记录伪造或再分流等具体行为承担后果，合法业务与未涉案人员不被整体定罪。
      - 正文或定稿摘要落实裴崇礼被判处死刑、裴怀山逃亡途中武力反抗并被击毙、裴兰馨被判处终身监禁的分层结局。
      - 正文或定稿摘要明确任群作为独立外部合作者对自身执行行为承担责任，并被判处终身监禁。
      - 正文或定稿摘要明确受害者后果与残余链条仍被处理。
      - 正文或定稿摘要完成涉案医疗节点与合法医院切割，保留医院转为国有医疗平台 51% 控股、未涉案小支 49% 持有的治理结构。
    upstream: "[PL-M-006｜陆佳凝境外承接网络显影](陆佳凝境外承接网络显影.md)；其上游为
      [PL-M-003｜解释权争夺与非法种印链](解释权争夺与非法种印链.md)。"
    downstream: 终局共同秩序与解释权新规则。
