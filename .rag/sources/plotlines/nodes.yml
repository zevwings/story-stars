  - id: PL-M-005
    type: 主线
    name: 唐雨薇主动归家与继承选择（已退役）
    status: retired
    locator: 唐雨薇主动回到唐家处理候选资格与继承考察，在食品子公司的经营整改中取得真实竞争资格、确认自己有能力承担最高席位后，主动支持唐雨宸继承，并保留个人财产与本人事项的决定权。
    criteria:
      - 正文或定稿摘要明确唐雨薇不是被召回或被男主推动，而是主动归家。
      - 正文或定稿摘要明确她在食品子公司的受限权限和专业制衡下完成真实经营整改，并通过能力与人性门槛。
      - 正文或定稿摘要明确唐雨霖、唐雨昭因各自主动越线失去资格，唐雨泽因最高责任意愿不足主动退出，最终形成唐雨宸与唐雨薇两名合格候选人。
      - 正文或定稿摘要明确她认真考虑过由自己承担最高席位，而不是因爱情或逃避责任直接退出。
      - 正文或定稿摘要明确她在拥有真实选择能力后主动支持唐雨宸继承，并保留三类个人财产及自身事项的知情与否决权。
      - 正文或定稿摘要明确她在食品子公司阶段性留任至整改与交接完成，此后退出家族经营决策体系，不被强制安排返回车行、另开工作室或长期留任家族产业。
    upstream: "[PL-S-012｜唐家公共压力与授权链分流](../../副线/唐家/公共压力与授权链分流.md)、[PL-S-028｜安若曦离开江城\
