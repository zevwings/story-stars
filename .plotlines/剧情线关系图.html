<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>剧情线关系图</title>
<style>
:root{color-scheme:light dark;--bg:#fbfaf7;--text:#272522;--muted:#706b64;--line:#bdb7ae;--panel:#fff;--main:#c79b16;--villain:#d5534c;--intimacy:#cf5f91;--relation:#4e85c6;--case:#399e90;--retired:#888}
@media(prefers-color-scheme:dark){:root{--bg:#191816;--text:#eeeae4;--muted:#aaa39a;--line:#5b554d;--panel:#24221f;--main:#b79b45;--villain:#b85f5b;--intimacy:#b87393;--relation:#658bb8;--case:#4e998e;--retired:#777}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}header{padding:22px 26px 8px}h1{margin:0;font-size:28px;font-weight:600}header p{margin:6px 0;color:var(--muted)}.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}.legend span{display:flex;align-items:center;gap:5px}.dot{width:11px;height:11px;border-radius:3px;background:var(--color)}.viewport{overflow:auto;padding:16px 26px 30px}.canvas{border:1px solid var(--line);border-radius:18px;background-color:var(--bg);background-image:radial-gradient(var(--line) .75px,transparent .75px);background-size:18px 18px}.x6-node text{font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}.error{margin:24px;padding:16px;border:1px solid var(--villain);border-radius:10px;color:var(--text)}
</style>
</head>
<body>
<header><h1>剧情线关系图</h1><p>横向按阶段／卷展开。单击节点聚焦一跳上下游，双击打开正式 Markdown，单击空白恢复全图；按住 Ctrl／Command 滚轮缩放。</p><div class="legend" id="legend"></div></header>
<main class="viewport"><div class="canvas" id="graph"></div></main>
<script src="vendor/x6.min.js"></script>
<script src="generated/graph-data.js"></script>
<script>
(() => {
  const data=window.PLOTLINE_GRAPH,X6=window.X6;
  if(!data||!X6?.Graph){document.getElementById('graph').innerHTML='<p class="error">图谱资源未生成，请在项目根目录执行 story-writer plotline graph build。</p>';return}
  const kinds={main:['主体主线','var(--main)'],villain:['反派／案件主线','var(--villain)'],intimacy:['亲密线','var(--intimacy)'],relation:['关系／生活线','var(--relation)'],case:['制度／案件线','var(--case)'],retired:['已退役','var(--retired)']};
  const css=name=>getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  const color=value=>value.startsWith('var(')?css(value.slice(4,-1)):value;
  const palette=Object.fromEntries(Object.entries(kinds).map(([key,[label,value]])=>[key,[label,color(value)]]));
  document.getElementById('legend').innerHTML=Object.entries(palette).map(([key,[label,value]])=>`<span><i class="dot" style="--color:${value}"></i>${label}</span>`).join('');
  const nodes=new Map(data.nodes.map(node=>[node.id,node])),stageIndex=new Map(data.stages.map((stage,index)=>[stage.id,index]));
  const stageWidth=310,stageGap=34,top=24,left=24,nodeWidth=264,nodeHeight=54,labelHeight=24,groupGap=18,nodeGap=9,stageHeader=68;
  const stageContent=data.stages.map(stage=>data.groups.map(group=>({group,items:group.nodes.map(id=>nodes.get(id)).filter(node=>node&&node.stages.includes(stage.id))})).filter(entry=>entry.items.length));
  const contentHeight=entries=>entries.reduce((sum,entry)=>sum+labelHeight+entry.items.length*(nodeHeight+nodeGap)-nodeGap+groupGap,0);
  const stageHeight=Math.max(720,...stageContent.map(entries=>stageHeader+contentHeight(entries)+24));
  const width=left*2+data.stages.length*stageWidth+(data.stages.length-1)*stageGap,height=top*2+stageHeight;
  const container=document.getElementById('graph');container.style.width=`${width}px`;container.style.height=`${height}px`;
  const graph=new X6.Graph({container,width,height,background:{color:'transparent'},panning:true,mousewheel:{enabled:true,modifiers:['ctrl','meta'],minScale:.35,maxScale:1.8},interacting:false,connecting:{router:{name:'manhattan',args:{padding:14}},connector:{name:'rounded',args:{radius:10}}}});
  const line=color('var(--line)'),panel=color('var(--panel)'),text=color('var(--text)'),muted=color('var(--muted)');
  const occurrences=new Map();
  data.stages.forEach((stage,column)=>{
    const x=left+column*(stageWidth+stageGap),stageId=`stage__${stage.id}`;
    graph.addNode({id:stageId,shape:'rect',x,y:top,width:stageWidth,height:stageHeight,zIndex:0,attrs:{body:{fill:panel,fillOpacity:.88,stroke:line,strokeWidth:1.4,rx:22,ry:22},label:{text:`${stage.label}\n${stage.title||''}`,fill:text,fontSize:16,fontWeight:600,refY:22,textVerticalAnchor:'top'}}});
    let y=top+stageHeader;
    for(const {group,items} of stageContent[column]){
      const kindColor=palette[group.kind]?.[1]||line;
      graph.addNode({id:`label__${stage.id}__${group.id}`,parent:stageId,shape:'rect',x:x+22,y,width:nodeWidth,height:labelHeight,zIndex:2,attrs:{body:{fill:'transparent',stroke:'transparent'},label:{text:group.label,fill:text,fontSize:13,fontWeight:600,textAnchor:'start',refX:2}}});
      y+=labelHeight;
      for(const node of items){
        const id=`node__${stage.id}__${node.id}`;
        graph.addNode({id,parent:stageId,shape:'rect',x:x+22,y,width:nodeWidth,height:nodeHeight,zIndex:3,data:{path:node.path,nodeId:node.id},attrs:{body:{fill:kindColor,fillOpacity:.14,stroke:kindColor,strokeWidth:1.2,rx:8,ry:8},label:{text:`${node.id}  ${node.title}`,fill:text,fontSize:12,textWrap:{width:nodeWidth-20,height:nodeHeight-12,ellipsis:true}}}});
        if(!occurrences.has(node.id))occurrences.set(node.id,[]);occurrences.get(node.id).push({id,stage:stage.id,column});
        y+=nodeHeight+nodeGap;
      }
      y+=groupGap-nodeGap;
    }
  });
  const occurrence=(nodeId,preferLast)=>{const items=occurrences.get(nodeId)||[];return preferLast?items.at(-1):items[0]};
  for(const edge of data.edges){const source=occurrence(edge.from,true),target=occurrence(edge.to,false);if(!source||!target)continue;const sourceGroup=data.groups.find(group=>group.nodes.includes(edge.from)),edgeColor=palette[sourceGroup?.kind]?.[1]||line;graph.addEdge({source:{cell:source.id,anchor:{name:'right'}},target:{cell:target.id,anchor:{name:source.column===target.column?'right':'left'}},zIndex:1,data:{from:edge.from,to:edge.to},router:{name:source.column===target.column?'oneSide':'manhattan',args:source.column===target.column?{side:'right',padding:18}:{padding:14}},connector:{name:'rounded',args:{radius:10}},attrs:{line:{stroke:edgeColor,strokeWidth:1.15,strokeOpacity:.07,targetMarker:{name:'classic',size:6}}}})}
  const plotNodes=()=>graph.getNodes().filter(node=>node.getData()?.nodeId);
  function resetFocus(){for(const node of plotNodes()){node.attr('body/opacity',1);node.attr('label/opacity',1);node.attr('body/strokeWidth',1.2)}for(const edge of graph.getEdges()){edge.attr('line/strokeOpacity',.07);edge.attr('line/strokeWidth',1.15)}}
  function focus(node){const id=node.getData().nodeId,related=new Set([id]);for(const edge of graph.getEdges()){const relation=edge.getData();if(relation.from===id||relation.to===id){related.add(relation.from);related.add(relation.to);edge.attr('line/strokeOpacity',.95);edge.attr('line/strokeWidth',2.2)}else{edge.attr('line/strokeOpacity',.015);edge.attr('line/strokeWidth',1)}}for(const item of plotNodes()){const active=related.has(item.getData().nodeId);item.attr('body/opacity',active?1:.16);item.attr('label/opacity',active?1:.22);item.attr('body/strokeWidth',item===node?2.8:active?1.6:1)}}
  graph.on('node:click',({node})=>{if(node.getData()?.path)focus(node)});
  graph.on('node:dblclick',({node})=>{const path=node.getData()?.path;if(path)location.href=`../${path}`});
  graph.on('blank:click',resetFocus);
  graph.on('node:mouseenter',({node})=>{if(node.getData()?.path)node.attr('body/strokeWidth',2.5)});
  graph.on('node:mouseleave',({node})=>{if(node.getData()?.path&&node.attr('body/strokeWidth')===2.5)node.attr('body/strokeWidth',1.2)});
})();
</script>
</body>
</html>
